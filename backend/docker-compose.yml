services:
  database:
    image: 'postgres:latest'
    ports: 
      - 5432:5432  
    env_file: 
      - .env
    volumes:  
      - ${PWD}/db-data/:/var/lib/postgresql/
    networks:
      - postgres-network
  pgadmin:
    image: dpage/pgadmin4
    ports:
      - 15433:80
    env_file:
      - .env
    depends_on:
      - database
    networks:
      - postgres-network
    volumes:
      - ${PWD}/pgadmin-data/:/var/lib/pgadmin/

networks:
  postgres-network:
    driver: bridge